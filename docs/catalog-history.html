<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Catalog history</title><link rel="stylesheet" href="assets/site.css"></head><body><header><nav aria-label="Research reports"><a href="index.html">Overview</a><a href="daily-report.html">Daily</a><a href="weekly-report.html">Weekly</a><a href="catalog-history.html">Catalog history</a><a href="METHODOLOGY.html">Methodology</a></nav></header><main><h1>Catalog history</h1><label for="search">Search products</label><input id="search" type="search" placeholder="Name, brand, or product key"><table><thead><tr><th>Product</th><th>Brand</th><th>Stable key</th></tr></thead><tbody id="results"></tbody></table><section id="detail" aria-live="polite"></section></main><footer><p>Independent, unaffiliated research. Source: <a href="https://www.shopgalafresh.com/">Gala Fresh public storefront</a>. Online values are not asserted as physical shelf prices.</p></footer><script>const esc=s=>String(s??'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let index;fetch('data/catalog-history/index.json').then(r=>r.json()).then(x=>{index=x;render('')});function render(q){q=q.toLowerCase();const rows=index.items.filter(x=>(x.name+' '+(x.brand||'')+' '+x.product_key).toLowerCase().includes(q)).slice(0,100);document.querySelector('#results').innerHTML=rows.map(x=>`<tr><td><button data-shard="${esc(x.shard)}" data-key="${esc(x.product_key)}">${esc(x.name)}</button></td><td>${esc(x.brand)}</td><td>${esc(x.product_key)}</td></tr>`).join('')}document.querySelector('#search').addEventListener('input',e=>render(e.target.value));document.querySelector('#results').addEventListener('click',async e=>{if(e.target.tagName!=='BUTTON')return;const x=e.target;const data=await fetch(`data/catalog-history/${x.dataset.shard}.json`).then(r=>r.json());const item=data.items.find(i=>i.product_key===x.dataset.key);document.querySelector('#detail').innerHTML=`<h2>${esc(item.name)}</h2><table><thead><tr><th>Date</th><th>Regular price</th><th>Promotions</th></tr></thead><tbody>${item.observations.map(o=>`<tr><td>${esc(o.date)}</td><td class="${o.catalog?'':'gap'}">${esc(o.catalog?(o.catalog.regular_price??'missing'):'gap')}</td><td>${esc(o.promotions.map(p=>p.description||p.promotion_id).join('; ')||'—')}</td></tr>`).join('')}</tbody></table>`});</script></body></html>
